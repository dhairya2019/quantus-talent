<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:
      radial-gradient(900px 420px at 85% -10%, rgba(41,121,255,.35), transparent 60%),
      radial-gradient(700px 360px at -5% 110%, rgba(41,121,255,.18), transparent 60%),
      linear-gradient(180deg,#08193a 0%,#0A1F44 60%,#0b234c 100%);
    color:#fff;
    position:relative;
    overflow:hidden;
  }
  body::before{
    content:"";position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);
    background-size:48px 48px;
    -webkit-mask-image:radial-gradient(ellipse at center,#000 30%,transparent 75%);
  }
  .wrap{position:relative;padding:72px 80px;display:flex;flex-direction:column;height:100%;justify-content:space-between}
  .top{display:flex;align-items:center;gap:18px}
  .mark{
    width:64px;height:64px;border-radius:14px;
    background:linear-gradient(135deg,#0A1F44 0%,#2979FF 100%);
    display:grid;place-items:center;font-weight:900;font-size:26px;letter-spacing:-.5px;
    box-shadow:0 12px 30px rgba(41,121,255,.45);
    border:1px solid rgba(255,255,255,.12);
  }
  .brand{font-size:30px;font-weight:800;letter-spacing:-.4px}
  .pill{
    display:inline-flex;align-items:center;gap:10px;
    padding:10px 18px;border-radius:999px;
    background:rgba(41,121,255,.15);border:1px solid rgba(41,121,255,.4);
    color:#cfe0ff;font-size:18px;font-weight:600;
    margin-bottom:28px;width:max-content;
  }
  .pill .dot{width:9px;height:9px;border-radius:50%;background:#2979FF;box-shadow:0 0 0 5px rgba(41,121,255,.25)}
  h1{
    font-size:78px;line-height:1.04;letter-spacing:-2.2px;font-weight:900;
    margin-bottom:24px;
  }
  .accent{
    background:linear-gradient(90deg,#7eb1ff,#2979FF);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .sub{font-size:26px;color:#c6d0e2;font-weight:500;letter-spacing:-.2px;max-width:920px}
  .bottom{display:flex;align-items:center;justify-content:space-between}
  .tracks{display:flex;gap:14px}
  .chip{
    padding:12px 22px;border-radius:12px;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
    font-size:18px;font-weight:600;
  }
  .url{font-size:18px;color:#9fb0cc;font-weight:500;letter-spacing:.3px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="mark">QT</div>
      <div class="brand">Quantus Talent</div>
    </div>
    <div>
      <div class="pill"><span class="dot"></span>Summer 2026 Cohort — Applications Open</div>
      <h1>100+ Internships for<br/><span class="accent">Chandigarh University</span> Students</h1>
      <p class="sub">Work on real projects in Marketing &amp; Tech. Learn → Execute → Get Certified.</p>
    </div>
    <div class="bottom">
      <div class="tracks">
        <div class="chip">Marketing Track</div>
        <div class="chip">Tech Track</div>
        <div class="chip">60-Day Program</div>
      </div>
      <div class="url">quantus-talent.vercel.app</div>
    </div>
  </div>
</body>
</html>
